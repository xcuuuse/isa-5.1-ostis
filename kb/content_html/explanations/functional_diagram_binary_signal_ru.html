<p><b><sc_element sys_idtf  = "concept_functional_diagram_binary_signal">Двоичный сигнал функциональной схемы</sc_element></b> представляет собой сигнал, принимающий одно из двух дискретных значений и используемый на функциональных схемах для обозначения логических состояний в системах автоматизации производственных процессов.</p>
