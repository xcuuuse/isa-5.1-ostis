<p>Описание:<br>
	- <b><sc_element sys_idtf="concept_pressure_switch_actuator">Привод реле давления</sc_element></b> реагирует на изменения давления жидкости или газа<br>
	- Комбинируется с <i><sc_element sys_idtf="concept_normally_open_relay_contact">нормально разомкнутым релейным контактом</sc_element></i> или <i><sc_element sys_idtf="concept_normally_closed_relay_contact">нормально замкнутым релейным контактом</sc_element></i><br>
	- Обеспечивает автоматическое управление на основе пороговых значений давления</p>
