<p>Описание:<br>
	- <b><sc_element sys_idtf="concept_differential_pressure_switch_actuator">Привод реле перепада давления</sc_element></b> контролирует разницу давления между двумя точками<br>
	- Используется с <i><sc_element sys_idtf="concept_pressure_switch_actuator">приводом реле давления</sc_element></i> для мониторинга фильтров и проверки потока<br>
	- Активирует сигналы тревоги или отключения при превышении пределов перепада</p>
