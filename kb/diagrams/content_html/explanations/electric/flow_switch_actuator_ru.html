<p>Описание:<br>
	- <b><sc_element sys_idtf="concept_flow_switch_actuator">Исполнительный механизм реле потока</sc_element></b> контролирует скорость потока жидкости в трубопроводах<br>
	- Используется с <i><sc_element sys_idtf="concept_pressure_switch_actuator">приводом реле давления</sc_element></i> для комплексного мониторинга гидросистем<br>
	- Обеспечивает достаточный поток для охлаждения, смазки или технологических нужд</p>
