<p>Опис:<br>
	- <b><sc_element sys_idtf="concept_pressure_switch_actuator">Привід реле тиску</sc_element></b> реагує на зміни тиску рідини або газу<br>
	- Комбінується з <i><sc_element sys_idtf="concept_normally_open_relay_contact">нормально розімкнутим контактом реле</sc_element></i> або <i><sc_element sys_idtf="concept_normally_closed_relay_contact">нормально замкнутим контактом реле</sc_element></i><br>
	- Забезпечує автоматичне керування на основі порогових значень тиску</p>
