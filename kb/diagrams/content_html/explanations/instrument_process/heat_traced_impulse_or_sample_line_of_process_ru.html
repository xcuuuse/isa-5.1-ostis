<p><b><sc_element sys_idtf="concept_heat_traced_impulse_or_sample_line_of_process">Тепловая [охлаждающая] импульсная или пробная линия процесса</sc_element></b> — это линия с тепловой трассировкой, которая поддерживает температуру технологической жидкости в <i><sc_element sys_idtf="concept_instrument_to_process_line">соединениях инструмент-процесс</sc_element></i> для предотвращения замерзания или конденсации.</p>
