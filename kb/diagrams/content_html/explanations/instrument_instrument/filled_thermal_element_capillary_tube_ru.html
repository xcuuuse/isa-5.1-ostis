<p><b><sc_element sys_idtf="concept_filled_thermal_element_capillary_tube">Заполненная капиллярная трубка теплового элемента</sc_element></b> — это герметичная трубка, заполненная жидкостью, которая передаёт изменения давления, вызванные температурой, от теплового датчика к измерительному устройству.</p>
